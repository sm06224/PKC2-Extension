name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks scans the full history
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: dist must be up to date (committed single-file HTML == build output)
        run: git diff --exit-code dist/
      # Pinned binary + checksum instead of gitleaks-action: no GitHub API /
      # token dependency (the action 403s without pull-requests permission),
      # and the artifact is integrity-checked.
      - name: gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks git --no-banner .
